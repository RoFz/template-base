name: Bug Report
description: Report a bug or unexpected behaviour.
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much
        detail as possible to help reproduce and fix the issue.

        > **Security issue?** Do not open a public issue — use the
        > [Security Advisory](https://github.com/RoFz/REPO_NAME/security/advisories/new)
        > instead.

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 'e.g. v1.0.0'
    validations:
      required: true

  - type: input
    id: os-arch
    attributes:
      label: OS / architecture
      placeholder: 'e.g. linux/amd64, darwin/arm64'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
