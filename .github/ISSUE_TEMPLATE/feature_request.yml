name: Feature Request
description: Suggest a new feature or improvement.
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem you are
        trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: >-
        Describe the problem or limitation you are running into.
        A clear description of **why** this feature is needed.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: >-
        Any alternative solutions or workarounds you have considered, and
        why they are insufficient.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or references here.
